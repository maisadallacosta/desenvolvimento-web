<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Instrument+Serif:ital@0;1&family=Playwrite+GB+S:ital,wght@0,100..400;1,100..400&display=swap" rel="stylesheet">

    <title>Tabela de Horários</title>
</head>
<body>
    <main>
        <div id="cabecalho">
            <h1>Maisa's Week</h1>
        </div>
        
        <table>
            <caption style="font-size: 20px;">Tabela de Horários</caption>

            <tr>
                <th></th>
                <th>DOM</th>
                <th>SEG</th>
                <th>TER</th>
                <th>QUA</th>
                <th>QUI</th>
                <th>SEX</th>
                <th>SAB</th>
            </tr>
            
            <tr>
                <th>07:30-13:30</th>
                <td>Dormir</td>
                <td colspan="5">Trabalho</td>
                <td>Dormir</td>
            </tr>
            <tr>
                <th>13:30-14:30</th>
                <td colspan="7">Almoço</td>
            </tr>
            <tr>
                <th>14:30-17:18</th>
                <td>Ler/Jogar/Estudar</td>
                <td colspan="5">Trabalho</td>
                <td>Ler/Jogar/Estudar</td>
            </tr>
            <tr>
                <th>19:00-22:15</th>
                <td>Jantar e Dormir</td>
                <td colspan="5">Faculdade</td>
                <td>Jantar e Dormir</td>
            </tr>
        </table>
    </main>

    <footer style="margin-top: 100px; text-align: center">
        <p>Ciência da Computação © Maísa Pascoaloto Dalla Costa, 2026</p>
    </footer>
</body>
</html>
